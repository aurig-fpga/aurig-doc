# Pre-commit hooks for aurig-doc
# Run on every commit (locally + CI).
# Install locally: pip install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
#
# Revs are aligned with aurig-sentinel's .pre-commit-config.yaml; keep the
# three Tcl repos (doc/core/lint) and sentinel on the same pins.

repos:
  # Standard hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(bat|ps1)$'
      - id: end-of-file-fixer
        exclude: '\.(bat|ps1)$'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: '\.(bat|ps1)$'

  # Secrets scanner. CI is the authoritative run; local runs may fail to
  # build gitleaks on restricted networks (proxy.golang.org TLS) -- skip
  # locally with SKIP=gitleaks if that bites.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # Custom local hooks
  - repo: local
    hooks:
      - id: no-ai-attribution
        name: Block AI attribution in commit messages
        language: pygrep
        # KEEP IN SYNC (verbatim) with the no-ai-attribution job in
        # .github/workflows/ci.yml -- same pattern, same escaping.
        entry: '(?i)(co-authored-by:.*(claude|copilot|codex|anthropic|openai|chatgpt)|assisted-by:.*(claude|copilot|codex|chatgpt)|generated.with.*(claude|copilot|codex|chatgpt)|noreply@anthropic\.com|🤖.*generated)'
        stages: [commit-msg]
