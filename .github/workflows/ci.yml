name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # aurig-doc itself.
      - name: Checkout aurig-doc
        uses: actions/checkout@v6
        with:
          path: aurig-doc

      # The cross-repo dependency: aurig-doc does NOT bundle the parser/util
      # core -- it requires aurig::core off ::auto_path. aurig-core is public,
      # so we check it out into a sibling dir with no credentials and point
      # TCLLIBPATH at it.
      - name: Checkout aurig-core (dependency)
        uses: actions/checkout@v6
        with:
          repository: aurig-fpga/aurig-core
          path: aurig-core

      - name: Install Tcl 8.6 + tcllib
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl tcllib
          tclsh <<'EOF'
          puts "tcl patchlevel: [info patchlevel]"
          EOF

      - name: Run cross-repo dependency proof + ported documenter tests
        working-directory: aurig-doc
        env:
          # TCLLIBPATH is a Tcl list of dirs prepended to ::auto_path; point it
          # at the aurig-core checkout so `package require aurig::core`
          # resolves (and is pulled transitively by aurig::doc).
          TCLLIBPATH: ${{ github.workspace }}/aurig-core
        run: |
          set -e
          fail=0
          tests=(
            test/test_doc_dependency.tcl
            test/test_documenter.tcl
            test/test_documenter_top.tcl
            test/test_doc_runner.tcl
            test/test_doc_tcllib_absent.tcl
            test/smoke/test_documenter_cleanup.tcl
          )
          for t in "${tests[@]}"; do
            echo "==================== $t ===================="
            if tclsh "$t"; then
              echo "RESULT: PASS  $t"
            else
              echo "RESULT: FAIL  $t (exit $?)"
              fail=1
            fi
          done
          exit $fail

  # Hygiene + secrets scan. This is the authoritative gitleaks run: local
  # hook installs may fail to build it on restricted networks, CI always
  # builds and runs it. Commit-msg-stage hooks are not exercised by
  # `run --all-files`; the no-ai-attribution job below covers that side.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1

  # Enforce the no-AI-attribution policy over the PR's commit range. The
  # local commit-msg hook is bypassable best-effort; this check is the
  # real barrier.
  no-ai-attribution:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check PR commit messages for AI attribution
        # KEEP IN SYNC (verbatim) with the no-ai-attribution pygrep hook in
        # .pre-commit-config.yaml -- same pattern, same escaping (grep -P
        # understands the inline (?i) flag).
        run: |
          git log "origin/${{ github.base_ref }}..HEAD" --format=%B > /tmp/pr-commit-msgs.txt
          grep -P '(?i)(co-authored-by:.*(claude|copilot|codex|anthropic|openai|chatgpt)|assisted-by:.*(claude|copilot|codex|anthropic|openai|chatgpt)|generated.with.*(claude|copilot|codex|anthropic|openai|chatgpt)|noreply@anthropic\.com|🤖.*generated)' /tmp/pr-commit-msgs.txt && status=0 || status=$?
          if [ "$status" -eq 0 ]; then
            echo "ERROR: AI attribution detected in PR commit messages (matches above)."
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "ERROR: grep failed (exit $status) -- check did not run."
            exit "$status"
          fi
          echo "OK: no AI attribution in commit range."
